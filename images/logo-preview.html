<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .logo-container {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #0A2540 0%, #1a3a5c 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .globe {
            width: 200px;
            height: 200px;
            position: relative;
        }
        .globe-ring {
            position: absolute;
            border: 4px solid #00D4AA;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .globe-ring.outer {
            width: 200px;
            height: 200px;
        }
        .globe-ellipse {
            position: absolute;
            border: 3px solid #00D4AA;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .globe-ellipse.h1 {
            width: 200px;
            height: 80px;
            opacity: 0.8;
        }
        .globe-ellipse.h2 {
            width: 200px;
            height: 140px;
            opacity: 0.6;
        }
        .globe-ellipse.v1 {
            width: 80px;
            height: 200px;
            opacity: 0.8;
        }
        .globe-ellipse.v2 {
            width: 140px;
            height: 200px;
            opacity: 0.6;
        }
        .center-dot {
            position: absolute;
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00D4AA 0%, #00B894 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .node {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #00D4AA;
            border-radius: 50%;
        }
        .node.n1 { top: 0; left: 50%; transform: translateX(-50%); }
        .node.n2 { top: 25%; right: 0; }
        .node.n3 { bottom: 25%; right: 0; }
        .node.n4 { bottom: 0; left: 50%; transform: translateX(-50%); }
        .node.n5 { bottom: 25%; left: 0; }
        .node.n6 { top: 25%; left: 0; }
        
        .company-name {
            margin-top: 30px;
            text-align: center;
        }
        .company-name .en {
            font-family: 'Arial', sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 2px;
        }
        .company-name .cn {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 18px;
            color: #00D4AA;
            margin-top: 8px;
        }
        .company-name .initials {
            font-family: 'Arial', sans-serif;
            font-size: 36px;
            font-weight: bold;
            color: #00D4AA;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Logo Version 1: Icon Only (for favicon, small usage) -->
    <div class="logo-container" style="width: 200px; height: 200px; margin: 20px;">
        <div class="globe" style="width: 100px; height: 100px;">
            <div class="globe-ring outer" style="width: 100px; height: 100px; border-width: 3px;"></div>
            <div class="globe-ellipse h1" style="width: 100px; height: 40px;"></div>
            <div class="globe-ellipse h2" style="width: 100px; height: 70px;"></div>
            <div class="globe-ellipse v1" style="width: 40px; height: 100px;"></div>
            <div class="globe-ellipse v2" style="width: 70px; height: 100px;"></div>
            <div class="center-dot" style="width: 16px; height: 16px;"></div>
            <div class="node n1" style="width: 8px; height: 8px;"></div>
            <div class="node n2" style="width: 8px; height: 8px; top: 20%;"></div>
            <div class="node n3" style="width: 8px; height: 8px; bottom: 20%;"></div>
            <div class="node n4" style="width: 8px; height: 8px;"></div>
            <div class="node n5" style="width: 8px; height: 8px; bottom: 20%;"></div>
            <div class="node n6" style="width: 8px; height: 8px; top: 20%;"></div>
        </div>
    </div>

    <!-- Logo Version 2: Full Logo with Text -->
    <div class="logo-container" style="margin: 20px;">
        <div class="globe">
            <div class="globe-ring outer"></div>
            <div class="globe-ellipse h1"></div>
            <div class="globe-ellipse h2"></div>
            <div class="globe-ellipse v1"></div>
            <div class="globe-ellipse v2"></div>
            <div class="center-dot"></div>
            <div class="node n1"></div>
            <div class="node n2"></div>
            <div class="node n3"></div>
            <div class="node n4"></div>
            <div class="node n5"></div>
            <div class="node n6"></div>
        </div>
        <div class="company-name">
            <div class="en">GLOBAL CREATIVE GROUP</div>
            <div class="cn">環球創想集團</div>
            <div class="initials">GCG</div>
        </div>
    </div>

    <!-- Logo Version 3: Horizontal Layout (for website header) -->
    <div style="background: linear-gradient(135deg, #0A2540 0%, #1a3a5c 100%); padding: 30px 50px; border-radius: 12px; display: flex; align-items: center; gap: 30px; margin: 20px;">
        <div class="globe" style="width: 80px; height: 80px;">
            <div class="globe-ring outer" style="width: 80px; height: 80px; border-width: 3px;"></div>
            <div class="globe-ellipse h1" style="width: 80px; height: 32px;"></div>
            <div class="globe-ellipse h2" style="width: 80px; height: 56px;"></div>
            <div class="globe-ellipse v1" style="width: 32px; height: 80px;"></div>
            <div class="globe-ellipse v2" style="width: 56px; height: 80px;"></div>
            <div class="center-dot" style="width: 12px; height: 12px;"></div>
        </div>
        <div>
            <div style="font-family: 'Arial', sans-serif; font-size: 22px; font-weight: bold; color: #ffffff; letter-spacing: 1px;">GLOBAL CREATIVE GROUP</div>
            <div style="font-family: 'Noto Sans SC', sans-serif; font-size: 14px; color: #00D4AA; margin-top: 4px;">環球創想集團有限公司</div>
        </div>
    </div>

    <div style="position: absolute; bottom: 20px; text-align: center; color: #666; font-family: Arial;">
        <p>Take a screenshot of the logo you want to use</p>
        <p>Or right-click → "Save image as" (for SVG use the logo.svg file)</p>
    </div>
</body>
</html>
